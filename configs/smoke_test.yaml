model: traffic_sign_net
seed: 42
device: auto

data:
  train_dir: data/raw/GTSRB/Final_Training/Images
  test_dir:  data/raw/GTSRB/Final_Test/Images
  image_size: 48
  num_classes: 43
  val_split: 0.2
  num_workers: 2

train:
  epochs: 3
  batch_size: 128
  learning_rate: 0.001
  weight_decay: 0.0
  optimizer: adam
  scheduler: plateau
  early_stopping_patience: 10
  horizontal_flip: false
  color_jitter: 0.2
  rotation_degrees: 15.0

output:
  checkpoints_dir: checkpoints
  reports_dir: reports
  figures_dir: reports/figures
  metrics_dir: reports/metrics
