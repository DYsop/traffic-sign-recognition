# Default experiment configuration.
# Each model has its own YAML file that extends this one conceptually.
# All paths are relative to the repository root.

model: deep_traffic_net
seed: 42
device: auto

data:
  train_dir: data/raw/GTSRB/Final_Training/Images
  test_dir:  data/raw/GTSRB/Final_Test/Images
  image_size: 48
  num_classes: 43
  val_split: 0.2
  num_workers: 4

train:
  epochs: 20
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 0.0001
  optimizer: adamw
  scheduler: plateau
  early_stopping_patience: 7
  horizontal_flip: false       # GTSRB contains directional signs — keep OFF
  color_jitter: 0.2
  rotation_degrees: 10.0

output:
  checkpoints_dir: checkpoints
  reports_dir: reports
  figures_dir: reports/figures
  metrics_dir: reports/metrics
